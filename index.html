<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Sweet Spots</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
:root{
  --cream:#F5EDD8;--cream-dark:#EDD9A3;--gold:#C9A84C;--gold-light:#E8C97A;--gold-deep:#8B6914;
  --brown:#6B4C1E;--sand-light:#EDE0C4;--moss:#7A8C5C;--moss-light:#B8C99A;
  --white:#FDFAF4;--text-dark:#3A2C1A;--text-mid:#6B5535;--text-light:#9C7D55;
  --border:rgba(180,140,80,0.25);--border-mid:rgba(180,140,80,0.45);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;
  background-image:radial-gradient(ellipse at 10% 20%,rgba(201,168,76,.12) 0%,transparent 50%),
  radial-gradient(ellipse at 90% 80%,rgba(196,122,74,.10) 0%,transparent 50%)}
.header{background:var(--white);border-bottom:1px solid var(--border-mid);padding:1rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;
  position:sticky;top:0;z-index:50}
.hbrand{display:flex;align-items:center;gap:10px}
.hicon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.htitle{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:600;color:var(--brown)}
.hsub{font-size:11px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px}
.hbtns{display:flex;gap:6px;flex-wrap:wrap}
.btn{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:500;padding:7px 14px;
  border-radius:20px;border:1px solid var(--border-mid);background:var(--white);
  color:var(--text-mid);cursor:pointer;transition:all .18s;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--sand-light);border-color:var(--gold);color:var(--brown)}
.btn-gold{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--white);border-color:var(--gold-deep)}
.btn-gold:hover{background:linear-gradient(135deg,var(--gold),var(--gold-deep))}
.btn-moss{background:var(--moss-light);color:var(--moss);border-color:var(--moss)}
.btn-moss:hover{background:var(--moss);color:var(--white)}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:12px}
.btn-del{color:#B05030;border-color:#E8C0A8}
.main{max-width:820px;margin:0 auto;padding:1.5rem 1rem}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem}
.stat{background:var(--white);border:1px solid var(--border);border-radius:14px;
  padding:10px 16px;text-align:center;flex:1;min-width:60px}
.stat b{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--gold-deep);display:block}
.stat span{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px}
.syncbox{background:var(--white);border:1px solid var(--border-mid);border-radius:16px;
  padding:1rem 1.25rem;margin-bottom:1.25rem}
.synctitle{font-size:12px;font-weight:600;color:var(--brown);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.syncdesc{font-size:11.5px;color:var(--text-light);margin-bottom:10px;line-height:1.6}
.syncrow{display:flex;gap:8px;flex-wrap:wrap}
#syncText{width:100%;font-size:11px;padding:8px;border-radius:10px;border:1px solid var(--border-mid);
  background:var(--cream);font-family:monospace;resize:none;height:70px;margin-top:8px;display:none}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.tab{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border-mid);
  background:var(--white);color:var(--text-mid);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{background:var(--sand-light);border-color:var(--gold)}
.tab.on{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--white);border-color:var(--gold-deep)}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}
.toolbar select,.toolbar input{font-family:'Inter',sans-serif;font-size:13px;padding:8px 14px;
  border-radius:20px;border:1px solid var(--border-mid);background:var(--white);
  color:var(--text-dark);flex:1;min-width:130px;outline:none;-webkit-appearance:none;appearance:none}
.toolbar select:focus,.toolbar input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
.slabel{font-family:'Playfair Display',serif;font-size:13px;color:var(--text-light);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:.75rem;border-left:3px solid var(--gold);padding-left:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:14px}
.card{background:var(--white);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:transform .18s,box-shadow .18s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(139,105,20,.12)}
.cimg{width:100%;height:140px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden}
.cimg img{width:100%;height:140px;object-fit:cover}
.cph{text-align:center;color:rgba(180,140,80,.5)}
.cph svg{display:block;margin:0 auto 5px}
.cph p{font-size:11px}
.ccats{position:absolute;top:7px;left:7px;right:7px;display:flex;flex-wrap:wrap;gap:3px}
.ccat{font-size:10px;font-weight:500;padding:2px 7px;border-radius:7px;
  background:rgba(253,250,244,.92);color:var(--brown);border:1px solid var(--border-mid);white-space:nowrap}
.bg-wisata{background:linear-gradient(135deg,#E1F0E8,#C5DEC8)}
.bg-kuliner{background:linear-gradient(135deg,#FDF0E0,#F5D9B0)}
.bg-hangout{background:linear-gradient(135deg,#EDE0F5,#D5BBE8)}
.bg-cafe{background:linear-gradient(135deg,#FDE8D8,#F0C4A0)}
.bg-manis{background:linear-gradient(135deg,#FDE8EE,#F5BDD0)}
.bg-asin{background:linear-gradient(135deg,#E8EEF5,#BDD0E8)}
.bg-keluarga{background:linear-gradient(135deg,#F0F5E0,#D0E5A0)}
.bg-lainnya{background:linear-gradient(135deg,var(--sand-light),var(--cream-dark))}
.cbody{padding:11px 13px 10px}
.cname{font-family:'Playfair Display',serif;font-size:14px;font-weight:500;color:var(--text-dark);margin-bottom:3px;line-height:1.3}
.cmeta{font-size:11.5px;color:var(--text-light);display:flex;align-items:center;gap:4px;margin-top:3px}
.cstars{display:flex;gap:2px;margin:5px 0 4px}
.cstar{font-size:15px;cursor:pointer}.cstar:hover{transform:scale(1.2)}
.cstar.on{color:var(--gold)}.cstar.off{color:var(--cream-dark)}
.cbadge{display:inline-block;font-size:10.5px;font-weight:500;padding:3px 9px;border-radius:10px;margin-top:4px}
.s-ingin{background:#EEF4FB;color:#2E6DA8;border:1px solid #C2D9F0}
.s-sudah{background:#EEF7EE;color:#2E7D3E;border:1px solid #B8DDB8}
.s-favorit{background:#FDF4E3;color:#9A6B0A;border:1px solid #E8CF8C}
.s-skip{background:#F5F2EE;color:#7A6A55;border:1px solid #D4C8B8}
.cnotes{font-size:11px;color:var(--text-mid);font-style:italic;margin-top:5px;line-height:1.4}
.cxphotos{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.cxphotos img{width:44px;height:44px;object-fit:cover;border-radius:7px;border:1px solid var(--border);cursor:pointer}
.cactions{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;align-items:center}
.mapslink{font-size:11px;font-weight:500;padding:4px 10px;border-radius:12px;
  background:#EEF4FB;color:#2E6DA8;border:1px solid #C2D9F0;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px}
.empty{text-align:center;padding:3rem 1rem;color:var(--text-light);grid-column:1/-1}
.empty svg{margin:0 auto 12px;display:block;opacity:.3}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(58,44,26,.6);z-index:200;
  overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;padding:1rem}
.modal{background:var(--white);border-radius:20px;padding:1.5rem;width:100%;max-width:480px;margin:auto;border:1px solid var(--border-mid)}
.mtitle{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--brown);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text-light);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.fg input,.fg select,.fg textarea{font-family:'Inter',sans-serif;width:100%;font-size:13px;
  padding:9px 13px;border-radius:12px;border:1.5px solid var(--border-mid);
  background:var(--cream);color:var(--text-dark);outline:none;-webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);background:var(--white);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
.fg textarea{resize:vertical;min-height:60px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.pill{font-size:12px;padding:6px 13px;border-radius:14px;border:1.5px solid var(--border-mid);
  background:var(--cream);color:var(--text-mid);cursor:pointer;user-select:none;-webkit-user-select:none;transition:all .15s}
.pill:hover{border-color:var(--gold);background:var(--sand-light)}
.pill.on{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--white);border-color:var(--gold-deep)}
.cprev{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;min-height:22px}
.cprev-tag{font-size:11px;padding:2px 9px;border-radius:7px;background:var(--sand-light);color:var(--brown);border:1px solid var(--border-mid)}
.cprev-empty{font-size:11px;color:var(--text-light);font-style:italic}
.srow{display:flex;gap:6px;font-size:27px;margin-top:3px}
.srow span{cursor:pointer;color:var(--cream-dark);-webkit-tap-highlight-color:transparent}
.srow span.on{color:var(--gold)}
.fpreview{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.fpreview img{width:54px;height:54px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer}
.filebtn{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:7px 15px;
  border-radius:12px;border:1.5px dashed var(--gold);background:var(--cream);
  color:var(--text-mid);cursor:pointer;margin-top:4px}
.filebtn:hover{background:var(--sand-light)}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.bigwrap{position:fixed;inset:0;background:rgba(10,6,2,.87);z-index:300;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.bigwrap img{max-width:92vw;max-height:88vh;border-radius:14px}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:var(--brown);color:var(--cream);padding:10px 20px;border-radius:20px;
  font-size:13px;z-index:400;pointer-events:none;white-space:nowrap;animation:fup .3s ease}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.footer{text-align:center;padding:2rem 1rem 1.5rem;font-size:11px;color:var(--text-light)}
@media(max-width:480px){
  .header{padding:.9rem 1rem}.htitle{font-size:1rem}
  .cards{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
  .stat b{font-size:18px}.tabs{gap:4px}.tab{font-size:11px;padding:5px 11px}
}
</style>
</head>
<body>
<header class="header">
  <div class="hbrand">
    <div class="hicon">🌿</div>
    <div><div class="htitle">My Sweet Spots</div><div class="hsub">Daftar tempat favoritmu</div></div>
  </div>
  <div class="hbtns">
    <button class="btn btn-gold" onclick="openAdd()">＋ Tambah</button>
    <button class="btn btn-moss" onclick="doPDF()">↓ PDF</button>
  </div>
</header>

<main class="main">
  <div class="stats" id="ST"></div>

  <div class="syncbox">
    <div class="synctitle">🔄 Sinkronisasi Laptop ↔ HP</div>
    <div class="syncdesc">
      <b>Dari laptop ke HP:</b><br>
      1. Klik <b>Salin Data</b> → teks kode muncul di bawah<br>
      2. Select all teks → copy → kirim ke HP via WhatsApp<br>
      3. Di HP buka situs → klik <b>Tempel Data</b> → paste → Terapkan
    </div>
    <div class="syncrow">
      <button class="btn btn-gold" onclick="salin()">📋 Salin Data</button>
      <button class="btn" onclick="toggleTempel()">📥 Tempel Data</button>
    </div>
    <textarea id="syncText" readonly placeholder="Klik Salin Data untuk memunculkan kode..."></textarea>
    <div id="tempelArea" style="display:none;margin-top:8px">
      <textarea id="tempelInput" style="width:100%;font-size:11px;padding:8px;border-radius:10px;border:1px solid var(--border-mid);background:var(--cream);font-family:monospace;resize:none;height:70px" placeholder="Paste kode data di sini..."></textarea>
      <div style="display:flex;gap:8px;margin-top:6px">
        <button class="btn btn-gold" onclick="terapkan()">✓ Terapkan</button>
        <button class="btn" onclick="toggleTempel()">Batal</button>
      </div>
    </div>
  </div>

  <div class="tabs" id="TABS"></div>
  <div class="toolbar">
    <select id="fSta" onchange="render()">
      <option value="">✦ Semua status</option>
      <option value="ingin">Ingin dikunjungi</option>
      <option value="sudah">Sudah dikunjungi</option>
      <option value="favorit">Favorit</option>
      <option value="skip">Tidak tertarik</option>
    </select>
    <select id="fRat" onchange="render()">
      <option value="">✦ Semua rating</option>
      <option value="5">★★★★★ 5 bintang</option>
      <option value="4">★★★★ 4+</option>
      <option value="3">★★★ 3+</option>
    </select>
    <input type="text" id="fQ" placeholder="🔍 Cari nama atau lokasi..." oninput="render()">
  </div>
  <div class="slabel" id="SL">Semua tempat</div>
  <div class="cards" id="CARDS"></div>
</main>
<footer class="footer">Dibuat dengan ❤️ · My Sweet Spots</footer>
<div id="MC"></div>
<div id="BIG"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
const K='mss_v4';
let D=[], AK='';

const KATS=[
  {id:'Wisata',icon:'🏞️',bg:'bg-wisata'},
  {id:'Kuliner',icon:'🍽️',bg:'bg-kuliner'},
  {id:'Hangout',icon:'✨',bg:'bg-hangout'},
  {id:'Cafe',icon:'☕',bg:'bg-cafe'},
  {id:'Makanan Manis',icon:'🍰',bg:'bg-manis'},
  {id:'Makanan Asin',icon:'🍜',bg:'bg-asin'},
  {id:'Resto Keluarga',icon:'👨‍👩‍👧',bg:'bg-keluarga'},
  {id:'Lainnya',icon:'📍',bg:'bg-lainnya'},
];
const BL={ingin:'s-ingin',sudah:'s-sudah',favorit:'s-favorit',skip:'s-skip'};
const BT={ingin:'Ingin dikunjungi',sudah:'Sudah dikunjungi',favorit:'Favorit',skip:'Tidak tertarik'};
const SC=['ingin','sudah','favorit','skip'];

function gk(i){return Array.isArray(i.kategori)?i.kategori:(i.kategori?[i.kategori]:[]);}
function ci(id){return KATS.find(k=>k.id===id)||{icon:'📍',bg:'bg-lainnya',id};}
function pbg(i){const k=gk(i);return k.length?ci(k[0]).bg:'bg-lainnya';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return String(Date.now()+Math.random()).replace('.','');}

function load(){
  try{D=JSON.parse(localStorage.getItem(K))||[];}catch(e){D=[];}
  if(!D.length) D=[
    {id:uid(),nama:'Warung Nasi Liwet Bu Tini',kategori:['Kuliner','Makanan Asin'],status:'favorit',lokasi:'Jl. Slamet Riyadi, Solo',harga:'Rp15.000–Rp35.000',notes:'Nasi liwet terenak!',rating:5,mapsUrl:'',fotos:[]},
    {id:uid(),nama:'Candi Prambanan',kategori:['Wisata'],status:'sudah',lokasi:'Klaten, Jawa Tengah',harga:'Rp50.000',notes:'Sunrise sangat indah',rating:4,mapsUrl:'https://maps.google.com/?q=Candi+Prambanan',fotos:[]},
    {id:uid(),nama:'The Heritage Palace',kategori:['Hangout','Resto Keluarga'],status:'ingin',lokasi:'Solo Baru',harga:'Rp25.000',notes:'Instagramable',rating:0,mapsUrl:'',fotos:[]},
  ];
  save();
}
function save(){localStorage.setItem(K,JSON.stringify(D));}

// ── SYNC ─────────────────────────────────────────────────────────
function salin(){
  const tx=document.getElementById('syncText');
  tx.style.display='block';
  tx.value=btoa(unescape(encodeURIComponent(JSON.stringify(D))));
  tx.select();
  try{document.execCommand('copy');toast('✓ Data disalin! Paste di HP.');}
  catch(e){toast('Silakan select all & copy manual.');}
}
function toggleTempel(){
  const a=document.getElementById('tempelArea');
  a.style.display=a.style.display==='none'?'block':'none';
  if(a.style.display==='block')document.getElementById('tempelInput').value='';
}
function terapkan(){
  const raw=(document.getElementById('tempelInput').value||'').trim();
  if(!raw){toast('⚠ Paste data dulu!');return;}
  try{
    const p=JSON.parse(decodeURIComponent(escape(atob(raw))));
    if(!Array.isArray(p))throw 0;
    if(!confirm('Data lama diganti. Lanjutkan?'))return;
    D=p;save();toggleTempel();buildTabs();render();
    toast('✓ '+D.length+' tempat berhasil dimuat!');
  }catch(e){toast('⚠ Data tidak valid.');}
}

// ── RENDER ────────────────────────────────────────────────────────
function buildTabs(){
  const el=document.getElementById('TABS');if(!el)return;
  let h=`<button class="tab${AK===''?' on':''}" onclick="setKat('')">🗺️ Semua (${D.length})</button>`;
  KATS.forEach(k=>{
    const n=D.filter(i=>gk(i).includes(k.id)).length;
    if(!n&&AK!==k.id)return;
    h+=`<button class="tab${AK===k.id?' on':''}" onclick="setKat('${k.id}')">${k.icon} ${k.id} (${n})</button>`;
  });
  el.innerHTML=h;
}
function setKat(k){AK=k;buildTabs();render();}

function stars(r,id){
  return[1,2,3,4,5].map(s=>`<span class="cstar ${s<=r?'on':'off'}" onclick="qRate('${id}',${s})">★</span>`).join('');
}

function render(){
  const sta=document.getElementById('fSta').value;
  const rat=parseInt(document.getElementById('fRat').value)||0;
  const q=document.getElementById('fQ').value.toLowerCase();
  const f=D.filter(i=>
    (!AK||gk(i).includes(AK))&&
    (!sta||i.status===sta)&&
    (!rat||(i.rating||0)>=rat)&&
    (!q||i.nama.toLowerCase().includes(q)||(i.lokasi||'').toLowerCase().includes(q))
  );
  const sl=document.getElementById('SL');
  if(sl)sl.textContent=f.length+' tempat'+(AK?' · '+AK:'')+(sta?' · '+BT[sta]:'');
  const c=document.getElementById('CARDS');if(!c)return;
  if(!f.length){
    c.innerHTML=`<div class="empty"><svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>Belum ada tempat ditemukan.</p></div>`;
    rStats();return;
  }
  c.innerHTML=f.map(i=>{
    const kats=gk(i);
    const tags=kats.map(k=>`<span class="ccat">${ci(k).icon} ${k}</span>`).join('');
    const xp=i.fotos&&i.fotos.length>1?`<div class="cxphotos">${i.fotos.slice(1).map(f=>`<img src="${f}" onclick="bigImg('${f}')">`).join('')}</div>`:'';
    return`<div class="card">
      <div class="cimg ${pbg(i)}" onclick="cimgClick('${i.id}')">
        ${i.fotos&&i.fotos.length?`<img src="${i.fotos[0]}" alt="${esc(i.nama)}">`:`<div class="cph"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><p>Tap untuk foto</p></div>`}
        <div class="ccats">${tags}</div>
      </div>
      <div class="cbody">
        <div class="cname">${esc(i.nama)}</div>
        <div class="cmeta">📍 ${esc(i.lokasi)||'—'}</div>
        ${i.harga?`<div class="cmeta">💰 ${esc(i.harga)}</div>`:''}
        <div class="cstars">${stars(i.rating||0,i.id)}</div>
        <span class="cbadge ${BL[i.status]}">${BT[i.status]}</span>
        ${i.notes?`<div class="cnotes">${esc(i.notes)}</div>`:''}
        ${xp}
        <div class="cactions">
          <button class="btn btn-sm" onclick="openEdit('${i.id}')">✏️ Edit</button>
          <button class="btn btn-sm" onclick="cycSta('${i.id}')">🔄</button>
          ${i.mapsUrl?`<a class="mapslink" href="${esc(i.mapsUrl)}" target="_blank">📍 Maps</a>`:''}
          <button class="btn btn-sm btn-del" onclick="del('${i.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
  rStats();
}

function rStats(){
  const t=D.length,ing=D.filter(i=>i.status==='ingin').length,
    sud=D.filter(i=>i.status==='sudah').length,fav=D.filter(i=>i.status==='favorit').length,
    rd=D.filter(i=>i.rating>0),avg=rd.length?(rd.reduce((a,i)=>a+i.rating,0)/rd.length).toFixed(1):'—';
  const el=document.getElementById('ST');
  if(el)el.innerHTML=`
    <div class="stat"><b>${t}</b><span>Total</span></div>
    <div class="stat"><b>${ing}</b><span>Ingin</span></div>
    <div class="stat"><b>${sud}</b><span>Sudah</span></div>
    <div class="stat"><b>${fav}</b><span>Favorit</span></div>
    <div class="stat"><b>${avg}</b><span>Avg ★</span></div>`;
}

function qRate(id,r){const i=D.find(x=>x.id===id);if(i){i.rating=i.rating===r?0:r;save();render();}}
function cycSta(id){const i=D.find(x=>x.id===id);if(i){i.status=SC[(SC.indexOf(i.status)+1)%SC.length];save();render();}}
function del(id){if(!confirm('Hapus tempat ini?'))return;D=D.filter(x=>x.id!==id);save();buildTabs();render();}
function cimgClick(id){
  const i=D.find(x=>x.id===id);if(!i)return;
  if(i.fotos&&i.fotos.length){bigImg(i.fotos[0]);return;}
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=()=>{Array.from(inp.files).forEach(f=>{const r=new FileReader();r.onload=e=>{i.fotos.push(e.target.result);save();render();};r.readAsDataURL(f);});};
  inp.click();
}
function bigImg(src){document.getElementById('BIG').innerHTML=`<div class="bigwrap" onclick="this.parentElement.innerHTML=''"><img src="${src}"></div>`;}

// ── MODAL ─────────────────────────────────────────────────────────
// modalState hidup di luar DOM — tidak pernah direset saat foto diupload
let MS=null;

function openAdd(){
  MS={id:null,kats:[],rating:0,fotos:[]};
  showModal('Tambah Tempat Baru','','ingin','','','','');
}
function openEdit(id){
  const i=D.find(x=>x.id===id);if(!i)return;
  MS={id:i.id,kats:[...gk(i)],rating:i.rating||0,fotos:[...(i.fotos||[])]};
  showModal('Edit Tempat',i.nama,i.status,i.lokasi||'',i.harga||'',i.notes||'',i.mapsUrl||'');
}

function showModal(title,nama,sta,lok,hrg,notes,maps){
  // render HTML modal — foto diambil dari MS.fotos, bukan dari DOM
  const pillsH=KATS.map(k=>`<button type="button" class="pill${MS.kats.includes(k.id)?' on':''}" data-k="${k.id}" onclick="togglePill(this,'${k.id}')">${k.icon} ${k.id}</button>`).join('');
  const starsH=[1,2,3,4,5].map(n=>`<span class="${n<=MS.rating?'on':''}" data-n="${n}" onclick="mStar(${n})">${n<=MS.rating?'★':'☆'}</span>`).join('');
  const fotosH=MS.fotos.map((f,i)=>`<img src="${f}" onclick="rmFoto(${i})" title="Hapus">`).join('');
  const prevH=MS.kats.length?MS.kats.map(k=>`<span class="cprev-tag">${ci(k).icon} ${k}</span>`).join(''):`<span class="cprev-empty">Belum dipilih</span>`;

  document.getElementById('MC').innerHTML=`
  <div class="overlay" id="OVL" onclick="ovlClick(event)">
    <div class="modal">
      <div class="mtitle">📍 ${title}</div>
      <div class="fg"><label>Nama Tempat *</label>
        <input type="text" id="mNama" value="${esc(nama)}" placeholder="Contoh: Warung Bu Tini"></div>
      <div class="fg"><label>Kategori * (boleh lebih dari satu)</label>
        <div class="pills" id="mPills">${pillsH}</div>
        <div class="cprev" id="mPrev">${prevH}</div></div>
      <div class="fg"><label>Status</label>
        <select id="mSta"><option value="ingin">Ingin dikunjungi</option><option value="sudah">Sudah dikunjungi</option><option value="favorit">Favorit</option><option value="skip">Tidak tertarik</option></select></div>
      <div class="fg"><label>Lokasi / Alamat</label>
        <input type="text" id="mLok" value="${esc(lok)}" placeholder="Jl. Slamet Riyadi, Solo"></div>
      <div style="display:flex;gap:10px">
        <div class="fg" style="flex:1"><label>Estimasi Harga</label>
          <input type="text" id="mHrg" value="${esc(hrg)}" placeholder="Rp20.000–Rp50.000"></div>
        <div class="fg" style="flex:1"><label>Link Google Maps</label>
          <input type="text" id="mMaps" value="${esc(maps)}" placeholder="https://maps.google.com/..."></div>
      </div>
      <div class="fg"><label>Rating</label>
        <div class="srow" id="mStars">${starsH}</div></div>
      <div class="fg"><label>Catatan / Tips</label>
        <textarea id="mNotes" placeholder="Menu favorit, jam buka, tips...">${esc(notes)}</textarea></div>
      <div class="fg"><label>Foto & Pricelist</label>
        <label class="filebtn" for="mFotoInp">📷 Pilih foto (bisa lebih dari 1)</label>
        <input type="file" id="mFotoInp" accept="image/*" multiple style="display:none" onchange="addFotos(this)">
        <div class="fpreview" id="mFPrev">${fotosH}</div></div>
      <div class="mfoot">
        <button type="button" class="btn" onclick="closeModal()">Batal</button>
        <button type="button" class="btn btn-gold" onclick="doSave()">💾 Simpan</button>
      </div>
    </div>
  </div>`;
  document.getElementById('mSta').value=sta;
}

function ovlClick(e){if(e.target.id==='OVL')closeModal();}
function closeModal(){document.getElementById('MC').innerHTML='';MS=null;}

function togglePill(el,k){
  if(!MS)return;
  const i=MS.kats.indexOf(k);
  if(i>=0)MS.kats.splice(i,1);else MS.kats.push(k);
  el.classList.toggle('on',MS.kats.includes(k));
  // update preview
  const p=document.getElementById('mPrev');
  if(p)p.innerHTML=MS.kats.length?MS.kats.map(k=>`<span class="cprev-tag">${ci(k).icon} ${k}</span>`).join(''):`<span class="cprev-empty">Belum dipilih</span>`;
}

function mStar(n){
  if(!MS)return;
  MS.rating=MS.rating===n?0:n;
  const row=document.getElementById('mStars');if(!row)return;
  row.querySelectorAll('span').forEach(el=>{
    const v=+el.dataset.n;el.className=v<=MS.rating?'on':'';el.textContent=v<=MS.rating?'★':'☆';
  });
}

function addFotos(inp){
  if(!MS)return;
  // baca file, simpan ke MS.fotos — TIDAK re-render seluruh modal
  Array.from(inp.files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      MS.fotos.push(e.target.result);
      // hanya update bagian preview foto saja
      const p=document.getElementById('mFPrev');
      if(p)p.innerHTML=MS.fotos.map((f,i)=>`<img src="${f}" onclick="rmFoto(${i})" title="Hapus">`).join('');
    };
    r.readAsDataURL(f);
  });
  inp.value='';
}

function rmFoto(i){
  if(!MS)return;
  MS.fotos.splice(i,1);
  const p=document.getElementById('mFPrev');
  if(p)p.innerHTML=MS.fotos.map((f,i)=>`<img src="${f}" onclick="rmFoto(${i})" title="Hapus">`).join('');
}

function doSave(){
  if(!MS){toast('⚠ Terjadi kesalahan, buka lagi form.');return;}
  const nama=(document.getElementById('mNama').value||'').trim();
  if(!nama){toast('⚠ Nama tempat wajib diisi!');return;}
  if(!MS.kats.length){toast('⚠ Pilih minimal 1 kategori!');return;}
  const obj={
    id:MS.id||uid(),
    nama,
    kategori:[...MS.kats],
    status:document.getElementById('mSta').value,
    lokasi:(document.getElementById('mLok').value||'').trim(),
    harga:(document.getElementById('mHrg').value||'').trim(),
    notes:(document.getElementById('mNotes').value||'').trim(),
    mapsUrl:(document.getElementById('mMaps').value||'').trim(),
    rating:MS.rating,
    fotos:[...MS.fotos]
  };
  if(MS.id){const idx=D.findIndex(x=>x.id===MS.id);if(idx>=0)D[idx]=obj;else D.push(obj);}
  else D.push(obj);
  save();closeModal();buildTabs();render();
  toast('✓ Tersimpan!');
}

// ── PDF ───────────────────────────────────────────────────────────
function doPDF(){
  if(!window.jspdf){toast('⚠ Library PDF belum siap.');return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=16;let y=22;
  doc.setFillColor(245,237,216);doc.rect(0,0,W,30,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(107,76,30);
  doc.text('My Sweet Spots',W/2,14,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(156,125,85);
  doc.text(`${new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})} · ${D.length} tempat`,W/2,21,{align:'center'});
  y=36;
  D.forEach(i=>{
    if(y>270){doc.addPage();y=18;}
    doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(58,44,26);
    doc.text(i.nama,M,y);
    if(i.rating){doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(201,168,76);doc.text('★'.repeat(i.rating)+'☆'.repeat(5-i.rating),W-M,y,{align:'right'});}
    y+=5;doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(107,76,30);
    const kats=gk(i);if(kats.length){doc.text('Kategori: '+kats.join(' · '),M+3,y);y+=4;}
    if(i.lokasi){doc.text('Lokasi: '+i.lokasi,M+3,y);y+=4;}
    if(i.harga){doc.text('Harga: '+i.harga,M+3,y);y+=4;}
    const sl={ingin:'Ingin dikunjungi',sudah:'Sudah dikunjungi',favorit:'Favorit',skip:'Tidak tertarik'};
    doc.text('Status: '+(sl[i.status]||i.status),M+3,y);y+=4;
    if(i.notes){const lines=doc.splitTextToSize('Catatan: '+i.notes,W-M*2-6);doc.setTextColor(120,96,60);doc.text(lines,M+3,y);y+=lines.length*4;}
    doc.setDrawColor(212,180,131);doc.setLineWidth(0.3);doc.line(M,y+1,W-M,y+1);y+=6;doc.setTextColor(0);
  });
  doc.save('my-sweet-spots.pdf');
}

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

// ── BOOT ──────────────────────────────────────────────────────────
load();buildTabs();render();
</script>
</body>
</html>
